name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-typecheck-test:
    name: Lint · Type-check · Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Unit tests
        run: npm test

  integration-rls:
    name: Integration Tests (RLS isolation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # supabase start automatically applies all migrations
      - name: Start Supabase local
        run: npx supabase start

      - name: Capture local credentials
        run: |
          STATUS=$(npx supabase status --output json)
          echo "SUPABASE_URL=$(echo $STATUS | jq -r '.API_URL')" >> $GITHUB_ENV
          echo "SUPABASE_ANON_KEY=$(echo $STATUS | jq -r '.ANON_KEY')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(echo $STATUS | jq -r '.SERVICE_ROLE_KEY')" >> $GITHUB_ENV

      - name: Run RLS integration tests
        run: npm test -w apps/api

  eval:
    name: LLM Eval Suite
    runs-on: ubuntu-latest
    # Runs only when the OPENAI_API_KEY secret is present so the job is a
    # no-op on forks and on PRs from contributors without access.
    if: ${{ secrets.OPENAI_API_KEY != '' }}
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # Force the cheapest model: ~20 cases × ~$0.0001 = <$0.003 per CI run
      LLM_RANKING_FOLLOW_UP_DRAFT: openai:gpt-5-nano
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Run eval suite (real LLM, grounding assertions)
        run: npm run test:eval -w apps/api

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
